<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de cuadrículas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

  <div class="container-fluid text-center mt-3">

    <h1>Sistema de cuadrículas</h1>

    <!-- 🔹 FILA ORIGINAL -->
    <div class="row align-items-start mb-4">
      <div class="col-12 col-sm-6 col-md-4 col-lg-2 bg-light border border-secondary-subtle p-4">Caja 1</div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-2 bg-light border border-secondary-subtle p-4">Caja 2</div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-2 bg-light border border-secondary-subtle p-4">Caja 3</div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-2 bg-light border border-secondary-subtle p-4">Caja 4</div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-2 bg-light border border-secondary-subtle p-4">Caja 5</div>
      <div class="col-12 col-sm-6 col-md-4 col-lg-2 bg-light border border-secondary-subtle p-4">Caja 6</div>
    </div>

    <!-- 🔹 FILA NUEVA (según instrucciones) -->
    <div class="row">

      <!-- Caja 1 -->
      <div class="col-12 col-sm-6 col-md-4 col-lg-2 bg-warning border p-4">
        Caja 1
      </div>

      <!-- Caja 2 -->
      <div class="col-12 col-sm-6 col-md-4 col-lg-2 bg-warning border p-4">
        Caja 2
      </div>

      <!-- Caja 3 -->
      <div class="col-12 col-sm-2 col-md-4 col-lg-2 bg-warning border p-4">
        Caja 3
      </div>

      <!-- Caja 4 -->
      <div class="col-12 col-sm-2 col-md-4 col-lg-2 bg-warning border p-4">
        Caja 4
      </div>

      <!-- Caja 5 -->
      <div class="col-12 col-sm-2 col-md-4 col-lg-2 bg-warning border p-4">
        Caja 5
      </div>

      <!-- Caja 6 -->
      <div class="col-12 col-sm-2 col-md-4 col-lg-2 bg-warning border p-4">
        Caja 6
      </div>

    </div>

  </div>

</body>
</html>
